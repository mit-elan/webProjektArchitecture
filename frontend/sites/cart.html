<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <title>Minimal Shop</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="/SimpleServer-3/frontend/js/cart.js"></script>
</head>

<body class="p-4">

    <div class="container">
        <h1 class="mb-4">Produkte</h1>

        <div class="row">
            <!-- Produkt 1 -->
            <div class="col-md-4">
                <div class="card p-3">
                    <h5>Produkt A</h5>
                    <button class="btn btn-primary button-addToCartList" data-id="1">
                        Add to Cart
                    </button>
                </div>
            </div>

        <!-- Load Cart -->
        <div class="mt-4">
            <button id="loadCartBtn" class="btn btn-success">
                Load Cart
            </button>
        </div>

        <!-- Anzeige -->
        <div class="mt-4">
            <h3>Warenkorb</h3>
            <ul id="cartOutput" class="list-group"></ul>
        </div>
    </div>
</body>

</html>
